<!DOCTYPE html>
<!--
  PayPlus Setup Wizard — Dynamics 365 model-driven web resource
  Web resource name: alex_payplus_setup.html  (HTML)
  Self-contained. Single-language (auto-detected from D365 user UI language: Hebrew 1037 → he/RTL, else en/LTR).
  Uses parent Xrm.WebApi only (no MSAL / no Azure).

  STAGED wizard, each stage persisted to the config row (alex_setupstage) so the admin can resume:
    Stage 1 CONNECT  — pick environment + bind the solution connection reference to a PayPlus connection
                       (keys are entered once in that connection dialog; the wizard only verifies the binding).
    Stage 2 PAGES    — fetch terminals (MyTerminals) → pick terminal → fetch payment pages (ListPaymentPages)
                       → pick payment page. Fetching runs through the Custom API alex_FetchPayPlusOptions
                       (→ flow → connector) and the result is polled from the config row (alex_paymentpages).
    Stage 3 VALIDATE — run alex_ValidatePayPlusConnection (→ flow → GeneratePaymentLink) and poll the result.
    Stage 4 DONE     — dashboard; re-validate / restart.
-->
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PayPlus Setup</title>
  <style>
    :root{
      --brand:#3b4aa0; --brand-dark:#2c3878; --brand-soft:#eef0fb;
      --ok:#1f9d63; --ok-soft:#e6f6ee; --ok-border:#bfe6d1;
      --pending:#8a94a6; --pending-soft:#eef1f5;
      --warn:#c9820a; --warn-soft:#fdf3e0;
      --err:#c8384b; --err-soft:#fbeaec;
      --ink:#1b2333; --muted:#67718a; --line:#e6e9f0; --bg:#f5f6fa; --card:#ffffff;
      --radius:16px; --shadow:0 2px 10px rgba(28,38,64,.06),0 8px 24px rgba(28,38,64,.05);
      --font:"Segoe UI","Assistant","Rubik","Heebo","Arial Hebrew","Helvetica Neue",Arial,system-ui,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font)}
    body{padding:24px 16px 64px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
    html[dir="rtl"] body{letter-spacing:0}
    html[dir="rtl"] .title{letter-spacing:-.2px}
    .wrap{max-width:820px;margin:0 auto}
    a{color:var(--brand);text-decoration:none}
    .row{display:flex;align-items:center;gap:12px}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;color:var(--brand-dark)}
    .pp-logo{width:30px;height:30px;display:block}
    .hero-logo{width:56px;height:56px;margin:0 auto 10px;display:block}
    .caption{text-align:center;color:var(--brand);font-weight:600;font-size:13px;margin-bottom:6px}
    h1.title{text-align:center;font-size:27px;line-height:1.2;margin:2px 0 8px;font-weight:800}
    p.sub{text-align:center;color:var(--muted);max-width:600px;margin:0 auto 22px;font-size:14px;line-height:1.55}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
    /* stepper */
    .stepper{display:flex;align-items:center;justify-content:center;gap:0;margin:0 auto 22px;max-width:640px}
    .stp{display:flex;flex-direction:column;align-items:center;gap:6px;flex:0 0 auto;width:96px}
    .stp .bub{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;background:#fff;border:2px solid var(--line);color:var(--muted)}
    .stp .lbl{font-size:11.5px;color:var(--muted);text-align:center;font-weight:600}
    .stp.active .bub{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:0 0 0 4px var(--brand-soft)}
    .stp.active .lbl{color:var(--brand-dark)}
    .stp.done .bub{background:var(--ok);border-color:var(--ok);color:#fff}
    .stp.done .lbl{color:var(--ok)}
    .stp-line{height:2px;background:var(--line);flex:1;margin:0 -8px;position:relative;top:-11px;min-width:20px}
    .stp-line.filled{background:var(--ok)}
    /* ===== Management Center ===== */
    .mc{max-width:760px;margin:0 auto}
    .mc-title{font-size:26px;font-weight:800;margin:0 0 4px}
    .mc-sub{color:var(--muted);font-size:14px;margin:0 0 18px;line-height:1.55}
    /* compact install status line */
    .mc-status{display:flex;align-items:center;gap:9px;background:var(--ok-soft);border:1px solid var(--ok-border);border-radius:12px;padding:11px 15px;margin-bottom:16px;font-size:13.5px;flex-wrap:wrap}
    .mc-status .ic{width:21px;height:21px;border-radius:50%;background:var(--ok);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex:none}
    .mc-status .st-txt{font-weight:600;color:var(--ok)}
    .mc-status .st-when{color:var(--muted)}
    .mc-status .st-link{margin-inline-start:auto;font-weight:600}
    /* full-width section accordion */
    .sec{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
    .sec-head{display:flex;align-items:center;gap:13px;padding:15px 18px;cursor:pointer;user-select:none}
    .sec-head:hover{background:#fafbfe}
    .sec-ic{width:36px;height:36px;border-radius:10px;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
    .sec-tx{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
    .sec-title{font-weight:700;font-size:15.5px;color:var(--ink)}
    .sec-desc{color:var(--muted);font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sec-chev{color:var(--muted);transition:transform .2s ease;font-size:12px;flex:none}
    .sec.open .sec-chev{transform:rotate(180deg)}
    .sec-body{border-top:1px solid var(--line);padding:2px 18px 12px}
    .sec-intro{font-size:12.5px;color:var(--muted);line-height:1.55;margin:12px 0 2px}
    /* setting rows — name+desc on start side, control on end side */
    .set-grouptitle{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 2px}
    .set-row{display:flex;align-items:center;gap:16px;padding:13px 0;border-bottom:1px solid var(--line)}
    .set-row:last-child{border-bottom:none}
    .set-info{flex:1;min-width:0}
    .set-name{font-weight:600;font-size:14px;color:var(--ink)}
    .set-desc{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.45}
    .set-ctrl{flex:none;display:flex;align-items:center;gap:12px}
    /* toggle switch */
    .switch{position:relative;display:inline-block;width:44px;height:24px;flex:none}
    .switch input{opacity:0;width:0;height:0}
    .switch .track{position:absolute;inset:0;background:var(--line);border-radius:999px;transition:.2s}
    .switch .knob{position:absolute;top:3px;inset-inline-start:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
    .switch input:checked ~ .track{background:var(--ok)}
    .switch input:checked ~ .knob{transform:translateX(20px)}
    html[dir="rtl"] .switch input:checked ~ .knob{transform:translateX(-20px)}
    /* expiry input (self-service) */
    .ss-exp{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12.5px;transition:opacity .15s}
    .ss-exp.off{opacity:.4}
    .ss-exp input{width:58px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:var(--font);text-align:center;color:var(--ink);background:#fff}
    .ss-exp input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
    .ss-exp input:disabled{background:#f4f5f8;color:var(--muted)}
    /* distribution-method sub-block (under a channel row) */
    .dist-sub{padding:0 0 6px;display:flex;flex-direction:column;gap:9px}
    .dist-methodrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .dist-lbl{font-size:12px;font-weight:600;color:var(--muted)}
    .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
    .seg button{border:none;background:none;padding:6px 15px;font-size:12.5px;font-family:var(--font);color:var(--muted);cursor:pointer;transition:background .15s}
    .seg button+button{border-inline-start:1px solid var(--line)}
    .seg button:hover{background:#fafbfe}
    .seg button.on{background:var(--brand);color:#fff;font-weight:600}
    .seg button.on:hover{background:var(--brand)}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px}
    .field .hint{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}
    .field input,.field select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:var(--font);background:#fff;color:var(--ink)}
    .field input:focus,.field select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
    .field select:disabled,.field input:disabled{background:#f4f5f8;color:var(--muted);cursor:not-allowed}
    .items{display:flex;flex-direction:column;gap:9px;margin:6px 0 4px}
    .item{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13.5px}
    .item .l{display:flex;align-items:center;gap:9px}
    .tick{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--ok);color:#fff;font-size:12px;flex:0 0 auto}
    .tick.off{background:var(--pending-soft);color:var(--pending);border:1px solid var(--line)}
    .chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid transparent;white-space:nowrap}
    .chip .dot{width:7px;height:7px;border-radius:50%}
    .chip.ok{background:var(--ok-soft);color:var(--ok);border-color:var(--ok-border)}
    .chip.ok .dot{background:var(--ok)}
    .chip.pending{background:var(--pending-soft);color:var(--pending)} .chip.pending .dot{background:var(--pending)}
    .chip.warn{background:var(--warn-soft);color:var(--warn)} .chip.warn .dot{background:var(--warn)}
    .chip.err{background:var(--err-soft);color:var(--err)} .chip.err .dot{background:var(--err)}
    .btn{appearance:none;border:1px solid var(--line);background:#fff;color:var(--ink);padding:10px 18px;border-radius:10px;font-weight:600;font-size:13.5px;cursor:pointer;font-family:var(--font);transition:.15s}
    .btn:hover{background:#f7f8fb}
    .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
    .btn.primary:hover{background:var(--brand-dark)}
    .btn.ghost{background:transparent}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .actions{display:flex;gap:10px;justify-content:space-between;margin-top:20px}
    .actions .right{display:flex;gap:10px;margin-inline-start:auto}
    .note{border-radius:12px;padding:12px 14px;font-size:13px;display:flex;gap:10px;align-items:flex-start;line-height:1.55;margin-top:6px}
    .note.info{background:var(--brand-soft);color:var(--brand-dark)}
    .note.warn{background:var(--warn-soft);color:#8a5a05}
    .note.err{background:var(--err-soft);color:#8f2534}
    .note.ok{background:var(--ok-soft);color:#0f6b41}
    .center{text-align:center}
    .spinner{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;display:inline-block;animation:spin .7s linear infinite;vertical-align:middle}
    .spinner.dark{border:2px solid var(--line);border-top-color:var(--brand)}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hero-badge{width:60px;height:60px;border-radius:50%;background:var(--ok-soft);border:1px solid var(--ok-border);color:var(--ok);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px}
    .kv{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
    .kv:last-child{border-bottom:0}
    .kv .k{color:var(--muted)} .kv .v{font-weight:600;word-break:break-all;text-align:end}
    .subhead{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:2px 0 10px}
    .divider{height:1px;background:var(--line);margin:18px 0}
    .muted{color:var(--muted)} .small{font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <svg class="pp-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PayPlus"><rect x="3" y="3" width="58" height="58" rx="15" fill="#16305c"/><text x="21" y="42" font-family="Segoe UI,Arial,sans-serif" font-size="34" font-weight="800" fill="#ffffff" text-anchor="middle">P</text><text x="44" y="30" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="800" fill="#39b54a" text-anchor="middle">+</text><path d="M19 47 Q32 56 45 47" fill="none" stroke="#39b54a" stroke-width="4.5" stroke-linecap="round"/></svg>

<script>

      previewLoad:"טעינת מסופים ועמודים",
      previewLoading:"שולף מסופים ועמודי תשלום…",

      /* stage 4 */

  /* ------------------------------------------------------------------ utils */
  function t(k,vars){ var s=(T[S.lang]&&T[S.lang][k])||k; if(vars){for(var v in vars){s=s.split("{"+v+"}").join(vars[v]);}} return s; }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }
  function applyStaticI18n(){ document.querySelectorAll("[data-i18n]").forEach(function(n){ n.textContent=t(n.getAttribute("data-i18n")); }); document.title=t("brandName"); }
  function genGuid(){ return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,function(c){var r=Math.random()*16|0,v=c==="x"?r:(r&0x3|0x8);return v.toString(16);}); }
  function chip(kind,label){ return '<span class="chip '+kind+'"><span class="dot"></span>'+esc(label)+'</span>'; }
  function tick(on){ return on?'<span class="tick">✓</span>':'<span class="tick off">•</span>'; }
  function delay(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }

  /* ------------------------------------------------------------------ Xrm */
  function getXrm(){ try{ if(window.parent&&window.parent.Xrm) return window.parent.Xrm; }catch(e){} return window.Xrm||null; }
  function api(){ return S.xrm.WebApi; }

  function loadRecord(){
    return api().retrieveMultipleRecords(C.table,
      "?$select="+C.idcol+",alex_name,alex_setupcompleted,alex_configvalidated,alex_environment,alex_setupstage,"+
      "alex_paymentpageuidref,alex_terminaluidref,alex_paymentpages,alex_validationrequestid,alex_lastvalidatedon,alex_lastvalidationstatus,alex_lastvalidationcode,alex_lastvalidationmessage,"+
      "alex_selfservice_sms_contact,alex_selfservice_email_contact,alex_selfservice_whatsapp_contact,alex_selfservice_sms_account,alex_selfservice_email_account,alex_selfservice_whatsapp_account,"+
      "alex_selfservice_sms_contact_expiry,alex_selfservice_email_contact_expiry,alex_selfservice_whatsapp_contact_expiry,alex_selfservice_sms_account_expiry,alex_selfservice_email_account_expiry,alex_selfservice_whatsapp_account_expiry,"+
      "alex_doc_quote_enabled,alex_doc_quote_draftpreview,alex_doc_quote_dist_email,alex_doc_quote_dist_sms,alex_doc_quote_dist_whatsapp,alex_doc_quote_autosend,"+
      "alex_doc_quote_dist_email_method,alex_doc_quote_dist_sms_method,alex_doc_quote_dist_whatsapp_method,"+
      "alex_doc_import_enabled,alex_doc_import_status,alex_doc_import_on,alex_doc_import_message,"+
      "alex_terminals_import_enabled,alex_terminals_import_status,alex_terminals_import_on,alex_terminals_import_message&$top=1"
    ).then(function(res){ return res.entities&&res.entities.length?res.entities[0]:null; });
  }
  function checkConnRef(){
    var ref=C.connRef[S.sel.env];
    S.conn={ checked:false, configured:false, verified:false, tested:false, testing:false };
    return api().retrieveMultipleRecords("connectionreference",
      "?$select=connectionreferencelogicalname,connectionid&$filter=connectionreferencelogicalname eq '"+ref+"'&$top=1")
      .then(function(res){ var e=res&&res.entities&&res.entities[0]; S.conn={ checked:true, configured:!!(e&&e.connectionid), verified:false, tested:false, testing:false }; return S.conn; })
      .catch(function(){ S.conn={ checked:true, configured:false, verified:false, tested:false, testing:false }; return S.conn; });
  }
  // Live probe: the stored connectionid only proves the reference is *configured* (it can be orphaned).
  // The only reliable proof of a working connection is an actual call through the flow → connector.
  function testConnection(){
    if(S.conn.testing) return;
    S.conn.testing=true; S.msg=null; render();
    fetchOptions("terminals","").then(function(res){
      S.conn.testing=false; S.conn.tested=true;
      if(res.items){ S.conn.verified=true; S.terminals=res.items; if(!res.items.length){ S.msg={kind:"warn",text:t("connLiveNoTerminals")}; } }
      else if(res.error){ S.conn.verified=false; S.msg={kind:"err",text:t("connTestFailed",{ref:C.connRef[S.sel.env]})}; }
      else { S.conn.verified=false; S.msg={kind:"err",text:t("connTestTimeout")}; }
      render();
    });
  }

  /* ------------------------------------------------------------------ boot */
  function boot(){
    S.xrm=getXrm(); S.view="loading"; render();
    if(!S.xrm){ return renderRaw(errorView(t("errNoXrm"))); }
    try{ var lcid=S.xrm.Utility.getGlobalContext().userSettings.languageId; S.lang=(lcid===1037)?"he":"en"; }catch(e){ S.lang="he"; }
    setDir(); applyStaticI18n();
    loadRecord().then(function(rec){
      S.record=rec;
      if(rec){
        S.sel.env=(rec.alex_environment===C.env.sandbox)?"sandbox":"prod";
        S.sel.pageUid=rec.alex_paymentpageuidref||"";
        S.sel.terminalUid=rec.alex_terminaluidref||"";
        S.stage=(typeof rec.alex_setupstage==="number")?rec.alex_setupstage:C.stage.connect;
      }
      return checkConnRef();
    }).then(function(){
      // resume guard: cannot be past Connect without at least a configured connection reference
      if(!S.conn.configured && S.stage!==C.stage.done){ S.stage=C.stage.connect; }
      if(S.record&&S.record.alex_setupcompleted===true&&S.record.alex_configvalidated===true){ S.stage=C.stage.done; }
      ensureExpiryDefaults();
      S.view="stage"; render();
    }).catch(function(e){ renderRaw(errorView((e&&e.message)||t("errGeneric"))); });
  }
  function setDir(){ var he=S.lang==="he"; document.documentElement.lang=he?"he":"en"; document.documentElement.dir=he?"rtl":"ltr"; }
  function reload(){ boot(); }

  /* ------------------------------------------------------------------ persistence */
  function ensureRecord(){
    if(S.record&&S.record[C.idcol]){ return Promise.resolve(S.record[C.idcol]); }
    return api().retrieveMultipleRecords(C.table,"?$select="+C.idcol+"&$filter=alex_name eq '"+C.fixedName+"'&$top=1")
      .then(function(res){
        if(res&&res.entities&&res.entities.length){ var id=res.entities[0][C.idcol]; S.record=S.record||{}; S.record[C.idcol]=id; return id; }
        return api().createRecord(C.table,{ alex_name:C.fixedName, alex_environment:envVal(), alex_setupcompleted:false, alex_setupstage:C.stage.connect })
          .then(function(r){ S.record=S.record||{}; S.record[C.idcol]=r.id; return r.id; });
      });
  }
  function envVal(){ return S.sel.env==="sandbox"?C.env.sandbox:C.env.prod; }
  function patchRecord(data){ return ensureRecord().then(function(id){ return api().updateRecord(C.table,id,data).then(function(){ if(S.record){for(var k in data){S.record[k]=data[k];}} return id; }); }); }

  var SS_EXP=["alex_selfservice_sms_contact_expiry","alex_selfservice_email_contact_expiry","alex_selfservice_whatsapp_contact_expiry","alex_selfservice_sms_account_expiry","alex_selfservice_email_account_expiry","alex_selfservice_whatsapp_account_expiry"];
  // Backfill a 7-day default on existing records so the form + wizard both show a validity value.
  function ensureExpiryDefaults(){
    var r=S.record; if(!r||!r[C.idcol]){ return Promise.resolve(); }
    var d={}, any=false;
    SS_EXP.forEach(function(f){ if(r[f]==null){ d[f]=7; r[f]=7; any=true; } });
    return any?patchRecord(d):Promise.resolve();
  }

  function saveStage(stageVal,extra){
    var data=Object.assign({ alex_name:C.fixedName, alex_setupstage:stageVal, alex_environment:envVal() }, extra||{});
    return patchRecord(data);
  }

  // On successful setup completion, ensure one active sync-profile record exists for the current environment.
  // Returns the record number (alex_name) when a NEW record was created, else null (one already existed).
  function ensureSyncProfile(){
    var spEnv=S.sel.env==="sandbox"?C.syncprofile.env.sandbox:C.syncprofile.env.prod;
    return api().retrieveMultipleRecords(C.syncprofile.table,"?$select="+C.syncprofile.nameCol+"&$filter=alex_environment eq "+spEnv+" and alex_isactive eq true&$top=1")
      .then(function(res){
        if(res&&res.entities&&res.entities.length){ return null; }
        return api().createRecord(C.syncprofile.table,{ alex_environment:spEnv, alex_isactive:true })
          .then(function(r){ return api().retrieveRecord(C.syncprofile.table,r.id,"?$select="+C.syncprofile.nameCol); })

  // LAST install step — import PayPlus document types into alex_payplus_documenttype.
  // Flips the alex_doc_import_enabled bit (which triggers the 'PayPlus - Import Document Types' flow),
  // then polls the config row until the flow reports Success/Failed. Reflects the result on S.record.
  function importDocumentTypes(){
    return patchRecord({ alex_doc_import_enabled:true, alex_doc_import_status:C.docImport.pending, alex_doc_import_message:"" })
      .then(function(){ return pollDocImport(); })
      .then(function(res){
        if(S.record){
          S.record.alex_doc_import_status = res.ok?C.docImport.success : (res.timeout?C.docImport.pending : C.docImport.failed);
          if(res.on!=null){ S.record.alex_doc_import_on=res.on; }
          if(res.message!=null){ S.record.alex_doc_import_message=res.message; }
        }
        return res;
      });
  }
  function pollDocImport(){
    var start=Date.now(), step=4000, id=S.record[C.idcol];
    return new Promise(function(resolve){
      function loop(){
        if(Date.now()-start>=120000){ resolve({ timeout:true }); return; }
        api().retrieveRecord(C.table,id,"?$select=alex_doc_import_status,alex_doc_import_on,alex_doc_import_message").then(function(rec){
          var st=rec.alex_doc_import_status;
          if(st===C.docImport.success){ resolve({ ok:true, on:rec.alex_doc_import_on, message:rec.alex_doc_import_message }); return; }
          if(st===C.docImport.failed){ resolve({ ok:false, on:rec.alex_doc_import_on, message:rec.alex_doc_import_message }); return; }
          setTimeout(loop,step);
        }).catch(function(){ setTimeout(loop,step); });
      }
      setTimeout(loop,step);
    });
  }

      S.busy.importing=false;

  /* ------------------------------------------------------------------ Custom API exec (unbound actions) */
  function execAction(name,params,paramTypes){
    var req=Object.assign({}, params, { getMetadata:function(){ return { boundParameter:null, operationType:0, operationName:name, parameterTypes:paramTypes }; } });
    return api().online.execute(req);
  }
  var strType={ typeName:"Edm.String", structuralProperty:1 };

  /* ------------------------------------------------------------------ FETCH options (terminals / pages) */
  function fetchOptions(kind,terminalUid){
    var reqId=genGuid();
    var envName=S.sel.env==="sandbox"?"Sandbox":"Production";
    // write correlation id, clear previous payload
    return patchRecord({ alex_validationrequestid:reqId, alex_paymentpages:"" }).then(function(){
      var params={ environment:envName, request_id:reqId };
      var types={ environment:strType, request_id:strType };
      if(kind==="pages"){ params.terminal_uid=terminalUid||""; types.terminal_uid=strType; }
      else { params.terminal_uid=""; types.terminal_uid=strType; }
      return execAction(C.fetchApi, params, types);
    }).then(function(){ return pollOptions(reqId,kind); });
  }
  function pollOptions(reqId,expectedKind){
    var start=Date.now(), step=4000, id=S.record[C.idcol];
    return new Promise(function(resolve){
      function loop(){
        if(Date.now()-start>=90000){ resolve({ timeout:true }); return; }
        api().retrieveRecord(C.table,id,"?$select=alex_paymentpages").then(function(rec){
          var raw=rec.alex_paymentpages;
          if(raw){
            var env=null; try{ env=JSON.parse(raw); }catch(e){}
            if(env&&env.requestId===reqId){
              if(env.kind==="error"){ resolve({ error:true, message:env.message }); return; }
              if(env.kind===expectedKind){ resolve({ items:env.items||[] }); return; }
            }
          }
          setTimeout(loop,step);
        }).catch(function(){ setTimeout(loop,step); });
      }
      setTimeout(loop,step);
    });
  }

  function fetchTerminals(){
    if(S.busy.terminals) return;
    S.busy.terminals=true; S.msg=null; render();
    fetchOptions("terminals","").then(function(res){
      S.busy.terminals=false;
      if(res.items){ S.terminals=res.items; if(!res.items.length){ S.msg={kind:"warn",text:t("noTerminals")}; } }
      else if(res.error){ S.msg={kind:"err",text:t("fetchErr")}; }
      else { S.msg={kind:"err",text:t("fetchTimeout")}; }
      render();
    });
  }
  function fetchPages(){
    if(S.busy.pages||!S.sel.terminalUid) return;
    S.busy.pages=true; S.msg=null; S.pages=[]; S.sel.pageUid=""; render();
    fetchOptions("pages",S.sel.terminalUid).then(function(res){
      S.busy.pages=false;
      if(res.items){ S.pages=res.items; if(!res.items.length){ S.msg={kind:"warn",text:t("noPages")}; } }
      else if(res.error){ S.msg={kind:"err",text:t("fetchErr")}; }
      else { S.msg={kind:"err",text:t("fetchTimeout")}; }
      render();
    });
  }

  // Step 2 preview: fetch ALL terminals, then each terminal's pages, into S.preview (read-only display).
  function loadPreview(){
    if(S.busy.preview) return;
    S.busy.preview=true; S.msg=null; S.preview=[]; render();
    fetchOptions("terminals","").then(function(res){
      if(!res.items){ S.busy.preview=false; S.msg={kind:"err",text:(res.error?t("fetchErr"):t("fetchTimeout"))}; render(); return; }
      S.terminals=res.items;
      if(!res.items.length){ S.busy.preview=false; S.msg={kind:"warn",text:t("previewEmpty")}; render(); return; }
      var list=res.items.slice(), out=[];
      (function next(i){
        if(i>=list.length){ S.preview=out; S.busy.preview=false; render(); return; }
        var term=list[i];
        fetchOptions("pages",term.value).then(function(pr){
          out.push({ value:term.value, label:term.label||term.value, pages:(pr.items||[]) }); next(i+1);
        }).catch(function(){ out.push({ value:term.value, label:term.label||term.value, pages:[] }); next(i+1); });
      })(0);
    });
  }
  // Pick the first terminal that has a page, so the validation step has a representative page to test.
  function autoSelectPage(){
    for(var i=0;i<S.preview.length;i++){
      var tm=S.preview[i];
      if(tm.pages&&tm.pages.length){
        S.sel.terminalUid=tm.value; S.sel.terminalLabel=tm.label;
        var pg=tm.pages[0]; S.sel.pageUid=pg.value; S.sel.pageLabel=pg.label||pg.value;
        return true;
      }
    }
    return false;
  }
  // Step 3 default picker: choose the default terminal (auto-selects its first page).
  function selDefaultTerminal(uid){
    for(var i=0;i<S.preview.length;i++){
      if(S.preview[i].value===uid){
        var tm=S.preview[i];
        S.sel.terminalUid=tm.value; S.sel.terminalLabel=tm.label;
        var pg=(tm.pages&&tm.pages.length)?tm.pages[0]:null;
        S.sel.pageUid=pg?pg.value:""; S.sel.pageLabel=pg?(pg.label||pg.value):"";
        break;
      }
    }
    render();
  }
  // Step 3 default picker: choose the default page within the selected terminal.
  function selDefaultPage(uid){
    var selTm=null; for(var i=0;i<S.preview.length;i++){ if(S.preview[i].value===S.sel.terminalUid){ selTm=S.preview[i]; break; } }
    if(selTm&&selTm.pages){ for(var j=0;j<selTm.pages.length;j++){ if(selTm.pages[j].value===uid){ S.sel.pageUid=selTm.pages[j].value; S.sel.pageLabel=selTm.pages[j].label||selTm.pages[j].value; break; } } }
    render();
  }
  // On completion, mark the chosen terminal + page as the account default (alex_isdefault) on the imported records.
  // Plugins enforce single-default per env / per terminal+processtype; the config singleton refs are already set.
  function setDefaults(){
    var env=envVal(), tUid=S.sel.terminalUid, pUid=S.sel.pageUid, jobs=[];
    if(tUid){
      jobs.push(api().retrieveMultipleRecords(C.defaults.terminalTable,"?$select="+C.defaults.terminalIdCol+"&$filter=alex_environment eq "+env+" and "+C.defaults.terminalUidCol+" eq '"+tUid+"'&$top=1")
        .then(function(r){ var e=r&&r.entities&&r.entities[0]; if(e){ return api().updateRecord(C.defaults.terminalTable,e[C.defaults.terminalIdCol],{ alex_isdefault:true }); } }));
    }
    if(pUid){
      jobs.push(api().retrieveMultipleRecords(C.defaults.pageTable,"?$select="+C.defaults.pageIdCol+"&$filter=alex_environment eq "+env+" and "+C.defaults.pageUidCol+" eq '"+pUid+"'&$top=1")
        .then(function(r){ var e=r&&r.entities&&r.entities[0]; if(e){ return api().updateRecord(C.defaults.pageTable,e[C.defaults.pageIdCol],{ alex_isdefault:true }); } }));
    }
    return Promise.all(jobs);
  }
  // Confirm step 2: trigger the terminals & pages import (creates the records), then continue to validation.
  function confirmImport(){
    if(S.busy.importingTerminals||!S.preview.length) return;
    S.busy.importingTerminals=true; S.msg=null; render();
    importTerminals().then(function(imp){
      S.busy.importingTerminals=false;
      if(imp&&imp.ok){
        autoSelectPage();
        S.msg={kind:"ok",text:t("terminalsImportOk")};
        goValidate();
      } else {
        S.msg={kind:(imp&&imp.timeout)?"warn":"err", text:(imp&&imp.timeout)?t("terminalsImportPending"):t("terminalsImportFail")};
        render();
      }
    }).catch(function(){ S.busy.importingTerminals=false; S.msg={kind:"err",text:t("terminalsImportFail")}; render(); });
  }

  /* ------------------------------------------------------------------ VALIDATE */
  function validate(){
    if(S.busy.validating||!S.sel.pageUid) return;
    S.busy.validating=true; S.msg=null; render();
    var reqId=genGuid(), envName=S.sel.env==="sandbox"?"Sandbox":"Production";
    patchRecord({
      alex_validationrequestid:reqId, alex_lastvalidationstatus:C.valStatus.pending, alex_configvalidated:false,
      alex_lastvalidationcode:0, alex_lastvalidationmessage:"", alex_paymentpageuidref:S.sel.pageUid, alex_terminaluidref:S.sel.terminalUid, alex_environment:envVal()
    }).then(function(){
      return execAction(C.validateApi,
        { payment_page_uid:S.sel.pageUid, terminal_uid:S.sel.terminalUid, environment:envName, request_id:reqId },
        { payment_page_uid:strType, terminal_uid:strType, environment:strType, request_id:strType });
    }).then(function(){ return pollValidation(reqId); })
      .then(function(res){ return finishValidate(res); })
      .catch(function(e){ S.busy.validating=false; S.msg={kind:"err",text:(e&&e.message)||t("errGeneric")}; render(); });
  }
  function pollValidation(reqId){
    var start=Date.now(), step=5000, id=S.record[C.idcol];
    return new Promise(function(resolve){
      function loop(){
        if(Date.now()-start>=120000){ resolve({ ok:false, timeout:true }); return; }
        api().retrieveRecord(C.table,id,"?$select=alex_lastvalidationstatus,alex_lastvalidationcode,alex_lastvalidationmessage").then(function(rec){
          var st=rec.alex_lastvalidationstatus;
          if(st===C.valStatus.success){ resolve({ ok:true, status:rec.alex_lastvalidationcode||200 }); return; }
          if(st===C.valStatus.failed){ resolve({ ok:false, status:rec.alex_lastvalidationcode||0, message:rec.alex_lastvalidationmessage }); return; }
          setTimeout(loop,step);
        }).catch(function(){ setTimeout(loop,step); });
      }
      setTimeout(loop,step);
    });
  }
  function finishValidate(res){
    var ok=!!(res&&res.ok);
    if(!ok){
      return patchRecord({ alex_configvalidated:false }).then(function(){
        S.busy.validating=false;
        var msg=(res&&res.timeout)?t("valTimeout"):t("valFailed",{n:(res&&res.status)||"—"});
        if(res&&res.message){ msg+=" — "+res.message; }
        S.msg={kind:"err",text:msg}; render();
      });
    }
    // Validation passed — the document-types import is a MANDATORY, blocking install step.
    // Setup is NOT marked complete (and we don't advance to the management center) until it succeeds.
    S.msg={kind:"info",text:t("docImportBlocking")}; render();
    return ensureSyncProfile()
      .then(function(spName){ S.spNameHolder=spName; return importDocumentTypes(); })
      .then(function(imp){
        if(imp&&imp.ok){
          return saveStage(C.stage.done,{ alex_setupcompleted:true, alex_configvalidated:true, alex_paymentpageuidref:S.sel.pageUid, alex_terminaluidref:S.sel.terminalUid })
            .then(function(){ return setDefaults().catch(function(){ return null; }); })
            .then(function(){
              S.busy.validating=false;
              if(S.record){ S.record.alex_lastvalidatedon=new Date().toISOString(); }
              var parts=[];
              if(S.spNameHolder){ parts.push(t("spCreated",{ n:S.spNameHolder })); }
              parts.push(t("docImportOk"));
              S.spNameHolder=null;
              S.msg={ kind:"ok", text:parts.join(" · ") };
              S.stage=C.stage.done; render();
            });
        }
        // Blocked: documents did not import — stay on the validate step, do NOT complete setup.
        S.busy.validating=false; S.spNameHolder=null;
        S.msg={ kind:"err", text:(imp&&imp.timeout)?t("docImportBlockPending"):t("docImportBlockFail") }; render();
      })
      .catch(function(){ S.busy.validating=false; S.spNameHolder=null; S.msg={ kind:"err", text:t("docImportBlockFail") }; render(); });
  }

  /* ------------------------------------------------------------------ navigation */
  function toStage(stageVal){ S.msg=null; S.stage=stageVal; saveStage(stageVal); render(); }
  function toggleDone(){ S.doneOpen=!S.doneOpen; render(); }
  function toggleSS(){ S.ssOpen=!S.ssOpen; render(); }
  function toggleDoc(){ S.docOpen=!S.docOpen; render(); }
  function togglePages(){ S.pagesOpen=!S.pagesOpen; render(); if(S.pagesOpen&&!S.preview.length&&!S.busy.preview){ loadPreview(); } }
  // Management-center: test the connection for a single payment page (generates a sample link).
  // Reuses the validate Custom API but does NOT touch alex_configvalidated / setup stage.
  function testPage(terminalUid,pageUid){
    if(S.testingPageUid||S.busy.validating) return Promise.resolve(false);
    S.testingPageUid=pageUid; S.pageTests[pageUid]="pending"; S.msg=null; render();
    var reqId=genGuid(), envName=(S.record&&S.record.alex_environment===C.env.sandbox)?"Sandbox":"Production";
    return patchRecord({ alex_validationrequestid:reqId, alex_lastvalidationstatus:C.valStatus.pending, alex_lastvalidationmessage:"" })
      .then(function(){ return execAction(C.validateApi,
        { payment_page_uid:pageUid, terminal_uid:terminalUid, environment:envName, request_id:reqId },
        { payment_page_uid:strType, terminal_uid:strType, environment:strType, request_id:strType }); })
      .then(function(){ return pollValidation(reqId); })
      .then(function(res){
        S.pageTests[pageUid]=(res&&res.ok)?"ok":((res&&res.timeout)?"pending":"fail");
        S.testingPageUid=""; render(); return !!(res&&res.ok);
      })
      .catch(function(){ S.pageTests[pageUid]="fail"; S.testingPageUid=""; render(); return false; });
  }
  // Management-center: test every imported page sequentially.
  function testAllPages(){
    if(S.busy.testingAll||S.testingPageUid||!S.preview.length) return;
    S.busy.testingAll=true; S.msg=null; render();
    var jobs=[];
    S.preview.forEach(function(tm){ (tm.pages||[]).forEach(function(p){ jobs.push({ tu:tm.value, pu:p.value }); }); });
    (function next(i){
      if(i>=jobs.length){ S.busy.testingAll=false; render(); return; }
      testPage(jobs[i].tu,jobs[i].pu).then(function(){ next(i+1); });
    })(0);
  }
  function setSS(field,on){ var d={}; d[field]=!!on; if(S.record){ S.record[field]=!!on; } patchRecord(d).then(render); }
  function setSSExpiry(field,val){ var n=parseInt(val,10); if(isNaN(n)||n<1){ n=1; } if(n>3650){ n=3650; } var d={}; d[field]=n; if(S.record){ S.record[field]=n; } patchRecord(d); }
  function setDistMethod(field,val){ var v=parseInt(val,10); var d={}; d[field]=v; if(S.record){ S.record[field]=v; } patchRecord(d).then(render); }
  function goPages(){ S.msg=null; S.stage=C.stage.pages; saveStage(C.stage.pages); render(); if(!S.preview.length&&!S.busy.preview){ loadPreview(); } }
  function goValidate(){ S.msg=null; S.stage=C.stage.validate; saveStage(C.stage.validate,{ alex_paymentpageuidref:S.sel.pageUid, alex_terminaluidref:S.sel.terminalUid }); render(); }
  function restart(){ S.msg=null; S.terminals=[]; S.pages=[]; S.preview=[]; S.pageTests={}; S.testingPageUid=""; S.sel.terminalUid=""; S.sel.pageUid=""; S.stage=C.stage.connect;
    saveStage(C.stage.connect,{ alex_setupcompleted:false, alex_configvalidated:false, alex_terminaluidref:"", alex_paymentpageuidref:"" }); render(); }

  /* ------------------------------------------------------------------ event handlers */
  function setEnv(v){ S.sel.env=(v==="sandbox")?"sandbox":"prod"; S.msg=null; S.terminals=[]; S.pages=[]; S.preview=[]; S.pageTests={}; S.testingPageUid=""; S.sel.terminalUid=""; S.sel.pageUid="";
    S.conn.verified=false; S.conn.tested=false; checkConnRef().then(render); render(); }
  function setTerminal(v){ S.sel.terminalUid=v; var tt=S.terminals.filter(function(x){return x.value===v;})[0]; S.sel.terminalLabel=tt?tt.label:""; S.pages=[]; S.sel.pageUid=""; if(v){ patchRecord({ alex_terminaluidref:v }); } render(); }

  /* ------------------------------------------------------------------ views */
  function stepper(){
    var order=[C.stage.connect,C.stage.pages,C.stage.validate,C.stage.done];
    var labels=[t("stepConnect"),t("stepPages"),t("stepValidate"),t("stepDone")];
    var cur=order.indexOf(S.stage); if(cur<0) cur=0;
    var allDone=(S.stage===C.stage.done);
    var h='<div class="stepper">';
    for(var i=0;i<order.length;i++){
      var isDone=allDone||i<cur;
      var cls=isDone?"done":(i===cur?"active":"");
      h+='<div class="stp '+cls+'"><div class="bub">'+(isDone?"✓":(i+1))+'</div><div class="lbl">'+esc(labels[i])+'</div></div>';
      if(i<order.length-1){ h+='<div class="stp-line '+(isDone?"filled":"")+'"></div>'; }
    }
    h+='</div>'; return h;
  }
  function header(caption,title,sub){
    return '<div class="caption">'+esc(caption)+'</div><h1 class="title">'+esc(title)+'</h1><p class="sub">'+esc(sub)+'</p>';
  }
  function noteHtml(){ return S.msg?('<div class="note '+esc(S.msg.kind)+'">'+esc(S.msg.text)+'</div>'):""; }

  function loadingView(){ return header("",t("loadingTitle"),t("loadingSub"))+'<div class="center"><span class="spinner dark"></span></div>'; }
  function errorView(msg){ return header("",t("errGeneric"),"")+'<div class="card"><div class="note err">⚠ '+esc(msg)+'</div><div class="actions"><span></span><div class="right"><button class="btn" onclick="App.reload()">'+t("retry")+'</button></div></div></div>'; }

  /* stage 1 — connect */
  function stageConnect(){
    var c=S.conn;
    var h=stepper()+header(t("s1Caption"),t("s1Title"),t("s1Sub"))+'<div class="card">';
    h+='<div class="field"><label>'+t("fEnv")+'</label><select onchange="App.setEnv(this.value)">'+
       '<option value="prod"'+(S.sel.env==="prod"?" selected":"")+'>'+esc(t("envProd"))+'</option>'+
       '<option value="sandbox"'+(S.sel.env==="sandbox"?" selected":"")+'>'+esc(t("envSandbox"))+'</option>'+
       '</select><div class="hint">'+t("envHint")+'</div></div>';
    h+='<div class="field"><label>'+t("connTitle")+'</label><div class="items">';
    if(!c.checked){ h+='<div class="item"><div class="l"><span class="spinner dark"></span> '+esc(t("connChecking"))+'</div></div>'; }
    else if(c.verified){ h+='<div class="item"><div class="l">'+tick(true)+esc(t("connVerified"))+'</div>'+chip("ok",t("verifiedChip"))+'</div>'; }
    else if(!c.configured){ h+='<div class="item"><div class="l">'+tick(false)+esc(t("connMissing"))+'</div>'+chip("err",t("missing"))+'</div>'; }
    else if(c.tested){ h+='<div class="item"><div class="l">'+tick(false)+esc(t("connBroken"))+'</div>'+chip("err",t("missing"))+'</div>'; }
    else { h+='<div class="item"><div class="l">'+tick(false)+esc(t("connConfigured"))+'</div>'+chip("pending",t("notTestedChip"))+'</div>'; }
    h+='</div></div>';
    if(c.checked&&!c.configured){ h+='<div class="note warn">⚠ '+esc(t("connMissingHelp",{ref:C.connRef[S.sel.env]}))+'</div>'; }
    else if(c.checked&&c.configured&&!c.verified&&!c.tested){ h+='<div class="note info">'+esc(t("connConfiguredHint"))+'</div>'; }
    h+=noteHtml();
    if(c.checked&&c.configured&&!c.verified){
      h+='<div class="field" style="margin-top:14px;margin-bottom:0"><button class="btn" '+(c.testing?"disabled":"")+' onclick="App.testConnection()">'+
         (c.testing?('<span class="spinner dark"></span> '+t("testingConn")):('⚡ '+t("testConn")))+'</button></div>';
    }
    h+='<div class="actions"><span></span><div class="right"><button class="btn primary" '+(c.verified?"":"disabled")+' onclick="App.goPages()">'+t("next")+' →</button></div></div>';
    h+='</div>'; return h;
  }

  /* stage 2 — terminals & pages preview + import */
  function stagePages(){
    var h=stepper()+header(t("s2Caption"),t("s2Title"),t("s2Sub"))+'<div class="card">';
    if(S.busy.preview){
      h+='<div class="center"><span class="spinner dark"></span> '+esc(t("previewLoading"))+'</div>';
    } else if(!S.preview.length){
      h+='<div class="field"><button class="btn primary" onclick="App.loadPreview()">'+t("previewLoad")+'</button></div>';
    } else {
      var totalPages=S.preview.reduce(function(a,x){ return a+((x.pages&&x.pages.length)||0); },0);
      h+='<div class="subhead">'+esc(t("previewCount",{t:S.preview.length,p:totalPages}))+' · <a href="#" onclick="App.loadPreview();return false;">'+t("previewReload")+'</a></div>';
      S.preview.forEach(function(tm){
        h+='<div style="border:1px solid #e5e7eb;border-radius:10px;padding:10px 12px;margin-bottom:8px">';
        h+='<div style="font-weight:600;margin-bottom:4px">🖥️ '+esc(tm.label)+'</div>';
        if(tm.pages&&tm.pages.length){
          h+='<ul style="margin:0;padding-inline-start:20px">'+tm.pages.map(function(p){ return '<li>'+esc(p.label||p.value)+'</li>'; }).join("")+'</ul>';
        } else {
          h+='<div style="color:#6b7280;font-size:.9em">'+esc(t("previewNoPages"))+'</div>';
        }
        h+='</div>';
      });
    }
    h+=noteHtml();
    var canConfirm=S.preview.length&&!S.busy.importingTerminals&&!S.busy.preview;
    h+='<div class="actions"><button class="btn ghost" '+(S.busy.importingTerminals?"disabled":"")+' onclick="App.toStage('+C.stage.connect+')">← '+t("back")+'</button>'+
       '<div class="right"><button class="btn primary" '+(canConfirm?"":"disabled")+' onclick="App.confirmImport()">'+
       (S.busy.importingTerminals?('<span class="spinner"></span> '+t("importingLbl")):(t("confirmImport")+' →'))+'</button></div></div>';
    h+='</div>'; return h;
  }

  /* stage 3 — validate */
  function stageValidate(){
    var h=stepper()+header(t("s3Caption"),t("s3Title"),t("s3Sub"))+'<div class="card">';
    h+='<div class="kv"><span class="k">'+t("lblEnv")+'</span><span class="v">'+esc(S.sel.env==="sandbox"?t("envSandbox"):t("envProd"))+'</span></div>';
    if(S.preview.length){
      var tOpts=S.preview.map(function(tm){ return '<option value="'+esc(tm.value)+'"'+(tm.value===S.sel.terminalUid?" selected":"")+'>'+esc(tm.label)+'</option>'; }).join("");
      h+='<div class="field" style="margin-top:12px"><label>'+t("lblTerminal")+'</label><select '+(S.busy.validating?"disabled":"")+' onchange="App.selDefaultTerminal(this.value)">'+tOpts+'</select></div>';
      var selTm=null; for(var i=0;i<S.preview.length;i++){ if(S.preview[i].value===S.sel.terminalUid){ selTm=S.preview[i]; break; } }
      var pages=(selTm&&selTm.pages)||[];
      var pOpts=pages.length?pages.map(function(p){ return '<option value="'+esc(p.value)+'"'+(p.value===S.sel.pageUid?" selected":"")+'>'+esc(p.label||p.value)+'</option>'; }).join(""):('<option value="">'+esc(t("previewNoPages"))+'</option>');
      h+='<div class="field"><label>'+t("lblPage")+'</label><select '+((S.busy.validating||!pages.length)?"disabled":"")+' onchange="App.selDefaultPage(this.value)">'+pOpts+'</select></div>';
      h+='<div class="note info">ℹ '+esc(t("defaultNote"))+'</div>';
    } else {
      if(S.sel.terminalLabel){ h+='<div class="kv"><span class="k">'+t("lblTerminal")+'</span><span class="v">'+esc(S.sel.terminalLabel)+'</span></div>'; }
      h+='<div class="kv"><span class="k">'+t("lblPage")+'</span><span class="v">'+esc(S.sel.pageLabel||S.sel.pageUid||"—")+'</span></div>';
      h+='<div class="note info" style="margin-top:12px">ℹ '+esc(t("s3PageNote"))+'</div>';
    }
    h+=noteHtml();
    h+='<div class="actions"><button class="btn ghost" '+(S.busy.validating?"disabled":"")+' onclick="App.toStage('+C.stage.pages+')">← '+t("back")+'</button>'+
       '<div class="right"><button class="btn primary" '+((S.sel.pageUid&&!S.busy.validating)?"":"disabled")+' onclick="App.validate()">'+
       (S.busy.validating?('<span class="spinner"></span> '+t("validatingLbl")):t("validateBtn"))+'</button></div></div>';
    h+='</div>'; return h;
  }

  /* stage 4 — done / management center */
  // A toggle switch bound to a boolean config field.
  function switchCtrl(field){
    var r=S.record||{}; var on=!!r[field];
    return '<label class="switch"><input type="checkbox" '+(on?"checked":"")+' onchange="App.setSS(\''+field+'\',this.checked)"><span class="track"></span><span class="knob"></span></label>';
  }
  // A setting row: name (+ optional description) on the start side, control on the end side.
  function setRow(name,desc,ctrl){
    return '<div class="set-row"><div class="set-info"><div class="set-name">'+esc(name)+'</div>'+
      (desc?('<div class="set-desc">'+esc(desc)+'</div>'):'')+'</div>'+
      '<div class="set-ctrl">'+ctrl+'</div></div>';
  }
  // A plain on/off setting row.
  function toggleSetting(name,field,desc){ return setRow(name,desc,switchCtrl(field)); }
  // A self-service setting row: expiry input + switch as the control.
  function ssSetting(name,desc,onField,expField){
    var r=S.record||{}; var on=!!r[onField]; var exp=(r[expField]==null?7:r[expField]);
    var ctrl='<div class="ss-exp'+(on?"":" off")+'">'+
        '<input type="number" min="1" max="3650" value="'+esc(exp)+'" '+(on?"":"disabled")+
          ' onchange="App.setSSExpiry(\''+expField+'\',this.value)" aria-label="'+esc(t("ssDays"))+'"/>'+
        '<span class="ss-days">'+esc(t("ssDays"))+'</span>'+
      '</div>'+switchCtrl(onField);
    return setRow(name,desc,ctrl);
  }
  function groupTitle(txt){ return '<div class="set-grouptitle">'+esc(txt)+'</div>'; }
  // A distribution-channel row: on/off toggle, and when ON, a PayPlus/Other method selector.
  // methodField is a picklist (100000000=PayPlus, 100000001=Other). null is treated as PayPlus.
  function distRow(name,enableField,methodField){
    var r=S.record||{}; var on=!!r[enableField];
    var h=toggleSetting(name,enableField);
    if(on){
      var m=(r[methodField]==null?100000000:r[methodField]);
      var isOther=(m===100000001);
      h+='<div class="dist-sub">'+
        '<div class="dist-methodrow">'+
          '<span class="dist-lbl">'+esc(t("docDistMethod"))+'</span>'+
          '<div class="seg" role="group">'+
            '<button type="button" class="'+(isOther?"":"on")+'" onclick="App.setDistMethod(\''+methodField+'\',100000000)">'+esc(t("docMethodPayPlus"))+'</button>'+
            '<button type="button" class="'+(isOther?"on":"")+'" onclick="App.setDistMethod(\''+methodField+'\',100000001)">'+esc(t("docMethodOther"))+'</button>'+
          '</div>'+
        '</div>'+
        (isOther?('<div class="note warn">⚠ '+esc(t("docMethodOtherWarn"))+'</div>'):'')+
      '</div>';
    }
    return h;
  }
  // Full-width collapsible section. opts:{open,icon,title,desc,toggle,body}
  function section(opts){
    var h='<div class="sec'+(opts.open?" open":"")+'">';
    h+='<div class="sec-head" onclick="'+opts.toggle+'" role="button" tabindex="0">'+
       '<span class="sec-ic">'+opts.icon+'</span>'+
       '<span class="sec-tx"><span class="sec-title">'+esc(opts.title)+'</span>'+
       (opts.desc?('<span class="sec-desc">'+esc(opts.desc)+'</span>'):'')+'</span>'+
       '<span class="sec-chev">▼</span></div>';
    if(opts.open){ h+='<div class="sec-body">'+opts.body+'</div>'; }
    h+='</div>';
    return h;
  }
  function selfServiceSection(){
    var r=S.record||{};
    var flags=["alex_selfservice_sms_contact","alex_selfservice_email_contact","alex_selfservice_whatsapp_contact","alex_selfservice_sms_account","alex_selfservice_email_account","alex_selfservice_whatsapp_account"];
    var n=flags.reduce(function(a,f){ return a+(r[f]?1:0); },0);
    var body='<div class="sec-intro">'+esc(t("ssIntro"))+'</div>';
    body+=groupTitle(t("ssGroupContact"))+
      ssSetting(t("ssEmail"),null,"alex_selfservice_email_contact","alex_selfservice_email_contact_expiry")+
      ssSetting(t("ssSms"),null,"alex_selfservice_sms_contact","alex_selfservice_sms_contact_expiry")+
      ssSetting(t("ssWhatsapp"),null,"alex_selfservice_whatsapp_contact","alex_selfservice_whatsapp_contact_expiry");
    body+=groupTitle(t("ssGroupAccount"))+
      ssSetting(t("ssEmail"),null,"alex_selfservice_email_account","alex_selfservice_email_account_expiry")+
      ssSetting(t("ssSms"),null,"alex_selfservice_sms_account","alex_selfservice_sms_account_expiry")+
      ssSetting(t("ssWhatsapp"),null,"alex_selfservice_whatsapp_account","alex_selfservice_whatsapp_account_expiry");
    body+='<div class="note warn" style="margin-top:14px">⚠ '+esc(t("ssWarn"))+'</div>';
    return section({ open:S.ssOpen, icon:"👤", title:t("ssTitle"), desc:t("ssAccSub",{n:n}), toggle:"App.toggleSS()", body:body });
  }
  // Document management — modular per document type (currently: Quote). Add a type by adding fields + a group.
  function documentSection(){
    var body='<div class="sec-intro">'+esc(t("docIntro"))+'</div>';
    body+=groupTitle(t("docQuote"))+
      toggleSetting(t("docEnable"),"alex_doc_quote_enabled",t("docEnableSub"))+
      toggleSetting(t("docDraft"),"alex_doc_quote_draftpreview",t("docDraftSub"));
    body+=groupTitle(t("docDist"))+
      distRow(t("docDistEmail"),"alex_doc_quote_dist_email","alex_doc_quote_dist_email_method")+
      distRow(t("docDistSms"),"alex_doc_quote_dist_sms","alex_doc_quote_dist_sms_method")+
      distRow(t("docDistWhatsapp"),"alex_doc_quote_dist_whatsapp","alex_doc_quote_dist_whatsapp_method");
    body+=groupTitle(t("docAutoGroup"))+
      toggleSetting(t("docAutoSend"),"alex_doc_quote_autosend");
    body+='<div class="note info" style="margin-top:14px">ℹ '+esc(t("docAutoHint"))+'</div>';
    return section({ open:S.docOpen, icon:"📄", title:t("docTitle"), desc:t("docAccSub"), toggle:"App.toggleDoc()", body:body });
  }
  // Expanded installation details (inside the management center).
  function installDetails(r,lastVal){
    var h='<div class="sec open"><div class="sec-body" style="border-top:none;padding-top:12px">';
    h+='<div class="kv"><span class="k">'+t("lblEnv")+'</span><span class="v">'+esc(r.alex_environment===C.env.sandbox?t("envSandbox"):t("envProd"))+'</span></div>';
    h+='<div class="kv"><span class="k">'+t("lblPage")+'</span><span class="v">'+esc(r.alex_paymentpageuidref||"—")+'</span></div>';
    h+='<div class="kv"><span class="k">'+t("lblTerminal")+'</span><span class="v">'+esc(r.alex_terminaluidref||"—")+'</span></div>';
    h+='<div class="kv"><span class="k">'+t("lblStatus")+'</span><span class="v">'+esc(r.alex_configvalidated?t("statusValidated"):t("statusNotValidated"))+'</span></div>';
    h+='<div class="kv"><span class="k">'+t("lblLastValidated")+'</span><span class="v">'+esc(lastVal)+'</span></div>';
    h+='<div class="actions"><button class="btn ghost" onclick="App.restart()">'+t("restart")+'</button>'+
       '<div class="right"><button class="btn primary" onclick="App.toStage('+C.stage.validate+')">'+t("reValidate")+'</button></div></div>';
    h+='</div></div>';
    return h;
  }
  // Document-types import status (last install step) shown in the management center.
  function docImportStatusRow(r){
    var st=r.alex_doc_import_status;
    var on=r.alex_doc_import_on?new Date(r.alex_doc_import_on).toLocaleString(S.lang==="he"?"he-IL":"en-GB"):"—";
    var ic, txt;
    if(S.busy.importing||st===C.docImport.pending){ ic="⏳"; txt=t("docImportRowPending"); }
    else if(st===C.docImport.success){ ic="✓"; txt=t("docImportRowOk"); }
    else if(st===C.docImport.failed){ ic="✗"; txt=t("docImportRowFail"); }
    else { ic="•"; txt=t("docImportRowNone"); }
    var showWhen=(st===C.docImport.success||st===C.docImport.failed);
    var link=S.busy.importing?"":('<a href="#" class="st-link" onclick="App.reimportDocs();return false;">'+esc(t("docImportReimport"))+'</a>');
    var when=showWhen?('<span class="st-when">· '+esc(on)+'</span>'):"";
    return '<div class="mc-status"><span class="ic">'+ic+'</span>'+
           '<span class="st-txt">'+esc(txt)+'</span>'+when+link+'</div>';
  }
  // Terminals & payment-pages import status shown in the management center.
  function terminalsImportStatusRow(r){
    var st=r.alex_terminals_import_status;
    var on=r.alex_terminals_import_on?new Date(r.alex_terminals_import_on).toLocaleString(S.lang==="he"?"he-IL":"en-GB"):"—";
    var ic, txt;
    if(S.busy.importingTerminals||st===C.terminalsImport.pending){ ic="⏳"; txt=t("terminalsImportRowPending"); }
    else if(st===C.terminalsImport.success){ ic="✓"; txt=t("terminalsImportRowOk"); }
    else if(st===C.terminalsImport.failed){ ic="✗"; txt=t("terminalsImportRowFail"); }
    else { ic="•"; txt=t("terminalsImportRowNone"); }
    var showWhen=(st===C.terminalsImport.success||st===C.terminalsImport.failed);
    var link=S.busy.importingTerminals?"":('<a href="#" class="st-link" onclick="App.reimportTerminals();return false;">'+esc(t("terminalsImportReimport"))+'</a>');
    var when=showWhen?('<span class="st-when">· '+esc(on)+'</span>'):"";
    return '<div class="mc-status"><span class="ic">'+ic+'</span>'+
           '<span class="st-txt">'+esc(txt)+'</span>'+when+link+'</div>';
  }
  // A small pass/fail/pending chip for a single page test.
  function pageTestChip(pageUid){
    var st=S.pageTests[pageUid];
    if(st==="ok") return chip("ok",t("testOk"));
    if(st==="fail") return chip("err",t("testFail"));
    if(st==="pending") return '<span class="chip pending"><span class="dot"></span>'+esc(t("testingLbl"))+'</span>';
    return "";
  }
  // Per-page connection test section (management center): list terminals → pages, each with a Test button.
  function pagesSection(){
    var body;
    if(S.busy.preview){
      body='<div class="center" style="padding:14px"><span class="spinner dark"></span> '+esc(t("pagesLoading"))+'</div>';
    } else if(!S.preview.length){
      body='<div class="sec-intro">'+esc(t("pagesIntro"))+'</div>'+
        '<div class="field" style="margin-top:10px"><button class="btn primary" onclick="App.loadPreview()">'+t("pagesLoad")+'</button></div>';
    } else {
      var busy=S.busy.testingAll||!!S.testingPageUid;
      body='<div class="sec-intro">'+esc(t("pagesIntro"))+' · <a href="#" onclick="App.loadPreview();return false;">'+t("pagesReload")+'</a></div>';
      S.preview.forEach(function(tm){
        body+='<div style="border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:8px 0">';
        body+='<div style="font-weight:600;margin-bottom:6px">🖥️ '+esc(tm.label)+'</div>';
        if(tm.pages&&tm.pages.length){
          tm.pages.forEach(function(p){
            var testing=S.testingPageUid===p.value;
            body+='<div class="item" style="padding:6px 0">'+
              '<div class="l">'+esc(p.label||p.value)+'</div>'+
              '<div class="row" style="gap:8px">'+pageTestChip(p.value)+
                '<button class="btn ghost" style="padding:5px 12px;font-size:12.5px" '+(busy?"disabled":"")+' onclick="App.testPage(\''+p.value+'\',\''+tm.value+'\')">'+
                (testing?('<span class="spinner"></span> '+t("testingLbl")):t("testPageBtn"))+'</button>'+
              '</div></div>';
          });
        } else {
          body+='<div style="color:var(--muted);font-size:.9em">'+esc(t("previewNoPages"))+'</div>';
        }
        body+='</div>';
      });
      body+='<div class="actions" style="margin-top:8px"><div class="right"><button class="btn primary" '+(busy?"disabled":"")+' onclick="App.testAllPages()">'+
        (S.busy.testingAll?('<span class="spinner"></span> '+t("testingLbl")):t("testAllBtn"))+'</button></div></div>';
    }
    return section({ open:S.pagesOpen, icon:"🖥️", title:t("pagesTitle"), desc:t("pagesAccSub"), toggle:"App.togglePages()", body:body });
  }
  function stageDone(){
    var r=S.record||{};
    var lastVal=r.alex_lastvalidatedon?new Date(r.alex_lastvalidatedon).toLocaleString(S.lang==="he"?"he-IL":"en-GB"):"—";
    var body='<svg class="hero-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="58" height="58" rx="15" fill="#16305c"/><text x="21" y="42" font-family="Segoe UI,Arial,sans-serif" font-size="34" font-weight="800" fill="#ffffff" text-anchor="middle">P</text><text x="44" y="30" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="800" fill="#39b54a" text-anchor="middle">+</text><path d="M19 47 Q32 56 45 47" fill="none" stroke="#39b54a" stroke-width="4.5" stroke-linecap="round"/></svg>';
    body+='<div class="caption">'+esc(t("doneCaption"))+'</div><h1 class="title">'+esc(t("doneTitle"))+'</h1><p class="sub">'+esc(t("doneSub"))+'</p>';
    body+='<div class="hero-badge">✓</div><div class="card">';
    body+='<div class="kv"><span class="k">'+t("lblEnv")+'</span><span class="v">'+esc(r.alex_environment===C.env.sandbox?t("envSandbox"):t("envProd"))+'</span></div>';
    body+='<div class="kv"><span class="k">'+t("lblPage")+'</span><span class="v">'+esc(r.alex_paymentpageuidref||"—")+'</span></div>';
    body+='<div class="kv"><span class="k">'+t("lblTerminal")+'</span><span class="v">'+esc(r.alex_terminaluidref||"—")+'</span></div>';
    body+='<div class="kv"><span class="k">'+t("lblStatus")+'</span><span class="v">'+esc(r.alex_configvalidated?t("statusValidated"):t("statusNotValidated"))+'</span></div>';
    body+='<div class="kv"><span class="k">'+t("lblLastValidated")+'</span><span class="v">'+esc(lastVal)+'</span></div>';
    body+='<div class="note ok" style="margin-top:14px">🔒 '+t("doneLocked")+'</div>';
    body+='<div class="actions"><button class="btn ghost" onclick="App.restart()">'+t("restart")+'</button>'+
       '<div class="right"><button class="btn primary" onclick="App.toStage('+C.stage.validate+')">'+t("reValidate")+'</button></div></div>';
    body+='</div>';
    var completed=!!(r.alex_setupcompleted&&r.alex_configvalidated);
    if(!completed){ return stepper()+body; }
    // installation completed → management center
    var h='<div class="mc">';
    h+='<div class="mc-title">'+esc(t("mgmtTitle"))+'</div><p class="mc-sub">'+esc(t("mgmtSub"))+'</p>';
    h+=noteHtml();
    h+='<div class="mc-status"><span class="ic">✓</span>'+
       '<span class="st-txt">'+esc(t("doneSectionTitle"))+'</span>'+
       '<span class="st-when">· '+esc(lastVal)+'</span>'+
       '<a href="#" class="st-link" onclick="App.toggleDone();return false;">'+esc(S.doneOpen?t("hideDetails"):t("showDetails"))+'</a></div>';
    if(S.doneOpen){ h+=installDetails(r,lastVal); }
    h+=docImportStatusRow(r);
    h+=terminalsImportStatusRow(r);
    h+=pagesSection();
    h+=selfServiceSection();
    h+=documentSection();
    h+='</div>';
    return h;
  }

  function renderRaw(html){ document.getElementById("app").innerHTML=html; applyStaticI18n(); updateBrand(); }
  function isCompleted(){ var r=S.record||{}; return !!(r.alex_setupcompleted&&r.alex_configvalidated); }
  function updateBrand(){ var el=document.querySelector('.brand [data-i18n="brandName"]'); if(el){ el.textContent=isCompleted()?t("mgmtBrand"):t("brandName"); } }
  function render(){
    var html;
    if(S.view==="loading"){ html=loadingView(); }
    else if(S.stage===C.stage.done){ html=stageDone(); }
    else if(S.stage===C.stage.pages){ html=stagePages(); }
    else if(S.stage===C.stage.validate){ html=stageValidate(); }
    else { html=stageConnect(); }
    renderRaw(html);
  }

  document.addEventListener("DOMContentLoaded",boot);

  return {
    reload:reload, setEnv:setEnv, goPages:goPages, goValidate:goValidate, toStage:toStage,
    testConnection:testConnection, toggleDone:toggleDone, toggleSS:toggleSS, toggleDoc:toggleDoc,
    fetchTerminals:fetchTerminals, fetchPages:fetchPages, setTerminal:setTerminal, setPage:setPage,
    loadPreview:loadPreview, confirmImport:confirmImport,
    togglePages:togglePages, testPage:testPage, testAllPages:testAllPages,
    selDefaultTerminal:selDefaultTerminal, selDefaultPage:selDefaultPage,
    validate:validate, restart:restart, setSS:setSS, setSSExpiry:setSSExpiry, setDistMethod:setDistMethod, reimportDocs:reimportDocs, reimportTerminals:reimportTerminals
  };
})();
</script>
</body>
</html>
